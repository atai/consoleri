# git-cliff configuration — https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project are documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}{% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | upper_first }}
{% endfor %}
{% endfor %}
"""
trim = true
render_always = true

[git]
conventional_commits = false
filter_unconventional = false
split_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
filter_commits = false
commit_parsers = [
  { message = "^chore\\(release\\):", skip = true },
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^Add", group = "Features" },
  { message = "^Fix", group = "Bug Fixes" },
  { message = "^Migrate|^Refactor", group = "Refactoring" },
  { message = ".*", group = "Other" },
]
