<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consoleri</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Consolas, 'Cascadia Mono', monospace;
        font-size: 12px;
        background: #0d1117;
        color: #c9d1d9;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 8px 12px;
        border-bottom: 1px solid #30363d;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
      }
      #log {
        flex: 1;
        overflow-y: auto;
        padding: 8px 12px;
      }
      .entry { margin-bottom: 4px; white-space: pre-wrap; word-break: break-all; }
      .entry .ts { color: #6e7681; margin-right: 8px; }
      .entry.info .lvl { color: #58a6ff; }
      .entry.warn .lvl { color: #d29922; }
      .entry.error .lvl { color: #ff7b72; }
      .entry.debug .lvl { color: #8b949e; }
      button {
        background: #21262d;
        border: 1px solid #30363d;
        color: #c9d1d9;
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
      }
      button:hover { background: #30363d; }
    </style>
  </head>
  <body>
    <header>
      <span id="title">Connection log</span>
      <button type="button" id="clear">Clear</button>
    </header>
    <div id="log"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
